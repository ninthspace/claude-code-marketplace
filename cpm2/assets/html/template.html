<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="generator" content="CPM2 shared HTML template">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23b4351f'/%3E%3Crect x='3' y='3' width='10' height='2' fill='%23f7f4ec'/%3E%3Crect x='3' y='7' width='10' height='2' fill='%23f7f4ec'/%3E%3Crect x='3' y='11' width='6' height='2' fill='%23f7f4ec'/%3E%3C/svg%3E">
  <title><!-- CPM:TITLE --></title>
  <style>
    /* =====================================================================
       CPM2 shared HTML template — "Dossier" editorial system.
       Self-contained: inline styling only, no external CSS/JS/fonts/images.
       Consume this file, do not fork it. Substitute the CPM: comment tokens;
       never edit this <style> block.
       ===================================================================== */

    :root {
      /* Editorial paper-and-ink palette */
      --paper:        #f7f4ec;
      --paper-panel:  #efeadd;
      --paper-sunk:   #ece5d4;
      --ink:          #1b1a17;
      --ink-soft:     #46423a;
      --ink-faint:    #847c6c;
      --rule:         #d9d0bd;
      --rule-strong:  #c4b9a1;
      --accent:       #b4351f;  /* vermilion */
      --accent-deep:  #822414;
      --accent-wash:  #f0ddd5;

      /* Severity scale (review findings) */
      --sev-critical: #b4351f;
      --sev-major:    #b9741a;
      --sev-minor:    #4f7a3a;
      --sev-info:     #2d6a8e;

      /* Characterful, fully self-contained font stacks (no web fonts) */
      --font-display: "Hoefler Text", "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
      --font-body:    "Iowan Old Style", "Palatino Linotype", "Charter", "Sorts Mill Goudy", Georgia, "Times New Roman", serif;
      --font-label:   ui-sans-serif, "Avenir Next", "Helvetica Neue", "Segoe UI", system-ui, sans-serif;
      --font-mono:    ui-monospace, "SF Mono", "JetBrains Mono", "Menlo", "Consolas", monospace;

      --measure:      70ch;
      --gutter:       clamp(1.25rem, 4vw, 3.5rem);
      --radius:       3px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      background-color: var(--paper);
      /* CSS-gradient paper texture — no external image, fully self-contained */
      background-image:
        radial-gradient(120% 80% at 50% -10%, #fffdf8 0%, rgba(255,253,248,0) 55%),
        radial-gradient(100% 100% at 100% 0%, var(--accent-wash) 0%, rgba(240,221,213,0) 30%),
        linear-gradient(180deg, var(--paper) 0%, var(--paper-sunk) 100%);
      background-attachment: fixed;
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 1.0625rem;
      line-height: 1.7;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "kern" 1, "liga" 1, "onum" 1;
    }

    /* --- Accessibility scaffolding --- */
    .cpm-skip {
      position: absolute;
      left: -999px;
      top: 0;
      background: var(--ink);
      color: var(--paper);
      padding: 0.6rem 1rem;
      font-family: var(--font-label);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 100;
      text-decoration: none;
    }
    .cpm-skip:focus { left: 0.75rem; top: 0.75rem; }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    /* =====================================================================
       Layout shell
       ===================================================================== */

    .cpm-shell {
      max-width: 78rem;
      margin: 0 auto;
      padding: 0 var(--gutter) 5rem;
    }

    .cpm-masthead {
      position: relative;
      padding: 3.5rem 0 1.75rem;
      border-bottom: 1px solid var(--rule-strong);
      animation: cpm-rise 0.7s cubic-bezier(.2,.7,.2,1) both;
    }
    .cpm-masthead::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: clamp(3.5rem, 14vw, 8rem);
      height: 5px;
      background: var(--accent);
    }

    .cpm-kicker {
      margin: 0 0 1rem;
      font-family: var(--font-label);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent-deep);
    }
    .cpm-kicker:empty { display: none; }

    .cpm-title {
      margin: 0;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(2.1rem, 5.5vw, 3.6rem);
      line-height: 1.05;
      letter-spacing: -0.015em;
      color: var(--ink);
      max-width: 22ch;
    }

    .cpm-meta {
      margin: 1.4rem 0 0;
      font-family: var(--font-label);
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      color: var(--ink-faint);
    }
    .cpm-meta:empty { display: none; }

    .cpm-grid {
      display: grid;
      grid-template-columns: 15rem minmax(0, 1fr);
      gap: clamp(2rem, 5vw, 4.5rem);
      align-items: start;
      margin-top: 2.75rem;
    }

    /* --- Contents sidebar nav --- */
    .cpm-toc {
      position: sticky;
      top: 1.75rem;
      font-family: var(--font-label);
      font-size: 0.86rem;
      line-height: 1.5;
      animation: cpm-fade 0.9s ease 0.15s both;
    }
    .cpm-toc-label {
      margin: 0 0 0.9rem;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faint);
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--rule);
    }
    .cpm-toc ul { list-style: none; margin: 0; padding: 0; }
    .cpm-toc li { margin: 0; }
    .cpm-toc a {
      display: block;
      padding: 0.32rem 0 0.32rem 0.85rem;
      border-left: 2px solid var(--rule);
      color: var(--ink-soft);
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s, padding-left 0.15s;
    }
    .cpm-toc a:hover,
    .cpm-toc a[aria-current="true"] {
      border-left-color: var(--accent);
      color: var(--accent-deep);
      padding-left: 1.1rem;
    }
    .cpm-toc ul ul a { padding-left: 1.7rem; font-size: 0.82rem; color: var(--ink-faint); }
    .cpm-toc ul ul a:hover { padding-left: 1.95rem; }

    /* =====================================================================
       Main content — long-form prose
       ===================================================================== */

    .cpm-main {
      max-width: var(--measure);
      animation: cpm-rise 0.8s cubic-bezier(.2,.7,.2,1) 0.1s both;
    }
    .cpm-main > :first-child { margin-top: 0; }

    .cpm-main h2 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.7rem;
      line-height: 1.2;
      letter-spacing: -0.01em;
      margin: 3rem 0 0.9rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--rule);
    }
    .cpm-main h3 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.28rem;
      margin: 2.2rem 0 0.6rem;
    }
    .cpm-main h4 {
      font-family: var(--font-label);
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin: 1.8rem 0 0.5rem;
    }

    /* Optional editorial section numbering: add class="cpm-numbered" to <main> */
    .cpm-numbered { counter-reset: cpm-section; }
    .cpm-numbered > h2 { counter-increment: cpm-section; }
    .cpm-numbered > h2::before {
      content: counter(cpm-section, decimal-leading-zero);
      display: block;
      font-family: var(--font-label);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    .cpm-main p { margin: 0 0 1.15rem; }
    .cpm-main a {
      color: var(--accent-deep);
      text-decoration: none;
      background-image: linear-gradient(var(--accent), var(--accent));
      background-size: 100% 1px;
      background-position: 0 1.08em;
      background-repeat: no-repeat;
      transition: background-size 0.15s;
    }
    .cpm-main a:hover { background-size: 100% 2px; }

    .cpm-main ul, .cpm-main ol { margin: 0 0 1.2rem; padding-left: 1.3rem; }
    .cpm-main li { margin: 0 0 0.4rem; }
    .cpm-main li::marker { color: var(--accent); }

    .cpm-main blockquote {
      margin: 1.6rem 0;
      padding: 0.2rem 0 0.2rem 1.4rem;
      border-left: 3px solid var(--accent);
      font-style: italic;
      color: var(--ink-soft);
    }

    .cpm-main hr {
      border: 0;
      border-top: 1px solid var(--rule);
      margin: 2.5rem 0;
    }

    .cpm-main strong { font-weight: 700; }
    .cpm-main abbr { text-decoration: none; border-bottom: 1px dotted var(--ink-faint); }

    /* --- Code --- */
    code, kbd, samp {
      font-family: var(--font-mono);
      font-size: 0.88em;
    }
    .cpm-main :not(pre) > code {
      background: var(--paper-sunk);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 0.08em 0.4em;
      color: var(--accent-deep);
    }
    .cpm-main pre {
      margin: 1.5rem 0;
      padding: 1.1rem 1.3rem;
      background: #211f1b;
      color: #ece5d4;
      border-radius: var(--radius);
      border: 1px solid #100f0c;
      box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset;
      overflow-x: auto;
      font-size: 0.84rem;
      line-height: 1.6;
    }
    .cpm-main pre code { background: none; border: 0; padding: 0; color: inherit; }

    /* --- Tables --- */
    .cpm-main table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.6rem 0;
      font-size: 0.94rem;
      font-family: var(--font-label);
    }
    .cpm-main caption {
      caption-side: top;
      text-align: left;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 0.6rem;
    }
    .cpm-main th {
      text-align: left;
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
      padding: 0.6rem 0.85rem;
      border-bottom: 2px solid var(--ink);
      background: var(--paper-panel);
    }
    .cpm-main td {
      padding: 0.6rem 0.85rem;
      border-bottom: 1px solid var(--rule);
      vertical-align: top;
    }
    .cpm-main tbody tr:hover td { background: rgba(180,53,31,0.04); }

    /* =====================================================================
       Component: ADR option / trade-off columns
       ===================================================================== */
    .adr-options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(15rem, 1fr));
      gap: 1.25rem;
      margin: 1.75rem 0;
    }
    .adr-option {
      border: 1px solid var(--rule-strong);
      border-radius: var(--radius);
      background: var(--paper-panel);
      padding: 1.2rem 1.25rem 1.35rem;
      display: flex;
      flex-direction: column;
    }
    .adr-option.is-chosen {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
      background: linear-gradient(180deg, var(--accent-wash), var(--paper-panel));
    }
    .adr-option-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0 0 0.3rem;
    }
    .adr-verdict {
      font-family: var(--font-label);
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin: 0 0 0.9rem;
    }
    .adr-option.is-chosen .adr-verdict { color: var(--accent-deep); }
    .adr-pros, .adr-cons { margin: 0 0 0.6rem; padding-left: 1.15rem; font-size: 0.9rem; }
    .adr-pros li::marker { content: "+  "; color: var(--sev-minor); font-weight: 700; }
    .adr-cons li::marker { content: "\2212  "; color: var(--sev-critical); font-weight: 700; }

    /* =====================================================================
       Component: review severity badges + findings
       ===================================================================== */
    .sev {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      font-family: var(--font-label);
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.22em 0.6em;
      border-radius: 100px;
      color: #fff;
      white-space: nowrap;
    }
    .sev::before {
      content: "";
      width: 0.5em; height: 0.5em;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
    }
    .sev-critical { background: var(--sev-critical); }
    .sev-major    { background: var(--sev-major); }
    .sev-minor    { background: var(--sev-minor); }
    .sev-info     { background: var(--sev-info); }

    .finding {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.6rem 1rem;
      align-items: baseline;
      padding: 1rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .finding-body > :first-child { margin-top: 0; }
    .finding-body > :last-child { margin-bottom: 0; }
    .finding-title { font-family: var(--font-display); font-weight: 700; font-size: 1.05rem; }

    /* =====================================================================
       Component: figure / diagram container (companion assets)
       ===================================================================== */
    .cpm-figure {
      margin: 2rem 0;
      padding: 1.5rem;
      background: var(--paper-panel);
      border: 1px solid var(--rule-strong);
      border-radius: var(--radius);
    }
    .cpm-figure svg,
    .cpm-figure img { display: block; max-width: 100%; height: auto; margin: 0 auto; }
    .cpm-figure figcaption {
      margin-top: 1rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--rule);
      font-family: var(--font-label);
      font-size: 0.8rem;
      color: var(--ink-faint);
      text-align: center;
    }
    .cpm-figure figcaption b { color: var(--ink-soft); font-weight: 700; }

    /* =====================================================================
       Component: callouts (notes / warnings / tips)
       ===================================================================== */
    .cpm-callout {
      margin: 1.6rem 0;
      padding: 1rem 1.2rem;
      border-radius: var(--radius);
      border-left: 4px solid var(--ink-faint);
      background: var(--paper-panel);
      font-size: 0.96rem;
    }
    .cpm-callout > :first-child { margin-top: 0; }
    .cpm-callout > :last-child { margin-bottom: 0; }
    .cpm-callout-label {
      font-family: var(--font-label);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.35rem;
    }
    .cpm-callout--note { border-left-color: var(--sev-info); }
    .cpm-callout--note .cpm-callout-label { color: var(--sev-info); }
    .cpm-callout--warn { border-left-color: var(--sev-major); }
    .cpm-callout--warn .cpm-callout-label { color: var(--sev-major); }
    .cpm-callout--tip  { border-left-color: var(--sev-minor); }
    .cpm-callout--tip  .cpm-callout-label { color: var(--sev-minor); }

    /* =====================================================================
       Component: memo / onboarding layout
       ===================================================================== */
    .cpm-memo {
      border: 1px solid var(--rule-strong);
      border-top: 4px solid var(--accent);
      border-radius: var(--radius);
      background: var(--paper);
      padding: 1.75rem 1.9rem;
      margin: 1.75rem 0;
    }
    .cpm-memo-fields {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 0.45rem 1.5rem;
      margin: 0 0 1.4rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--rule);
      font-family: var(--font-label);
      font-size: 0.9rem;
    }
    .cpm-memo-fields dt {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      align-self: baseline;
    }
    .cpm-memo-fields dd { margin: 0; color: var(--ink); }

    /* =====================================================================
       Footer
       ===================================================================== */
    .cpm-footer {
      max-width: 78rem;
      margin: 0 auto;
      padding: 2rem var(--gutter) 0;
      border-top: 1px solid var(--rule);
      font-family: var(--font-label);
      font-size: 0.78rem;
      color: var(--ink-faint);
    }
    .cpm-footer:empty { display: none; }

    /* =====================================================================
       Motion (subtle, respects reduced-motion)
       ===================================================================== */
    @keyframes cpm-rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
    @keyframes cpm-fade { from { opacity: 0; } to { opacity: 1; } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    /* =====================================================================
       Responsive — sidebar folds above content (CSS only, no JS)
       ===================================================================== */
    @media (max-width: 60rem) {
      .cpm-grid { grid-template-columns: 1fr; gap: 2rem; }
      .cpm-toc {
        position: static;
        border: 1px solid var(--rule);
        border-radius: var(--radius);
        padding: 1rem 1.2rem;
        background: var(--paper-panel);
      }
    }

    /* =====================================================================
       Print — shareable as PDF; drop chrome, ink on white
       ===================================================================== */
    @media print {
      body { background: #fff; color: #000; font-size: 11pt; }
      .cpm-skip, .cpm-toc { display: none; }
      .cpm-grid { display: block; }
      .cpm-main { max-width: none; }
      .cpm-main a { background: none; color: #000; }
      .cpm-main pre { background: #f2f2f2; color: #000; border-color: #ccc; }
      .adr-option, .cpm-figure, .cpm-callout, .cpm-memo, .cpm-main th { background: #fff !important; }
      .cpm-main h2, .cpm-main h3 { page-break-after: avoid; }
      .finding, .adr-option, .cpm-figure { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <a class="cpm-skip" href="#cpm-main">Skip to content</a>

  <div class="cpm-shell">
    <header class="cpm-masthead" role="banner">
      <p class="cpm-kicker"><!-- CPM:SUBTITLE --></p>
      <h1 class="cpm-title"><!-- CPM:TITLE --></h1>
      <p class="cpm-meta"><!-- CPM:META --></p>
    </header>

    <div class="cpm-grid">
      <nav class="cpm-toc" aria-label="Contents">
        <p class="cpm-toc-label">Contents</p>
        <!-- CPM:NAV -->
      </nav>

      <main id="cpm-main" class="cpm-main">
        <!-- CPM:CONTENT -->
      </main>
    </div>
  </div>

  <footer class="cpm-footer" role="contentinfo">
    <!-- CPM:FOOTER -->
  </footer>
</body>
</html>
